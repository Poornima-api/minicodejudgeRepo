<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body>

<h2>Registered Users</h2>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Score</th>
    </tr>

    <tr th:each="user : ${users}">

        <td th:text="${user.id}"></td>

        <td th:text="${user.username}"></td>

        <td th:text="${user.email}"></td>

        <td th:text="${user.score}"></td>

    </tr>

</table>

</body>
</html>
